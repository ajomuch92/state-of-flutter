<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081629"/>
      <stop offset="100%" stop-color="#050E1A"/>
    </linearGradient>
    <linearGradient id="flutter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01BAEF"/>
      <stop offset="100%" stop-color="#54C5F8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Flutter logo mark (the two chevrons) -->
  <!-- Top chevron -->
  <polygon points="8,7 18,7 24,13 14,13" fill="url(#flutter)"/>
  <!-- Bottom-left triangle (dark cutout effect) -->
  <polygon points="14,13 24,13 19,18" fill="#042B59"/>
  <!-- Bottom chevron -->
  <polygon points="11,16 19,16 26,24 18,24" fill="url(#flutter)" opacity="0.85"/>
</svg>